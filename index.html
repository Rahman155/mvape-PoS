<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mvape Kasir</title>
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }

        /* Smooth transitions globally */
        button, a, input, select, textarea {
            transition: all 0.15s ease;
        }

        /* Better tap targets on mobile */
        button { min-height: 44px; }

        /* Scrollbar hide utility */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Bottom safe area for iOS */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }

        /* Micro-animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .animate-fadeInUp  { animation: fadeInUp  0.3s ease forwards; }
        .animate-fadeIn    { animation: fadeIn     0.2s ease forwards; }
        .animate-slideInRight { animation: slideInRight 0.25s ease forwards; }
        .animate-scaleIn   { animation: scaleIn    0.2s ease forwards; }

        /* Active press effect */
        .btn-press:active { transform: scale(0.96); }

        /* Tab active indicator */
        .tab-active-glow { box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }

        /* Glass card */
        .glass {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Custom scrollbar for desktop */
        @media (min-width: 768px) {
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
            ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        }

        /* ===== GLOBAL APP SIDEBAR ===== */
        :root {
            --sidebar-width: 280px;
        }

        #app-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: var(--sidebar-width);
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #app-sidebar.sidebar-open {
            transform: translateX(0);
        }
        #app-sidebar-overlay {
            position: fixed;
            inset: 0;
            z-index: 49;
            background: rgba(0,0,0,0);
            pointer-events: none;
            transition: background 0.3s ease;
        }
        #app-sidebar-overlay.overlay-active {
            background: rgba(0,0,0,0.55);
            pointer-events: all;
            backdrop-filter: blur(2px);
        }

        /* Desktop: sidebar push layout (no overlay) */
        @media (min-width: 768px) {
            #app-sidebar {
                top: 56px; /* height of top nav (h-14 = 3.5rem = 56px) */
                height: calc(100% - 56px);
                z-index: 35;
            }
            #app-sidebar-overlay.overlay-active {
                background: rgba(0,0,0,0);
                backdrop-filter: none;
                pointer-events: none;
            }
            #main-nav {
                transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #main-nav.nav-sidebar-open {
                padding-left: var(--sidebar-width);
            }
            #app-container {
                transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #app-container.content-sidebar-open {
                padding-left: calc(var(--sidebar-width) + 1.5rem);
            }
        }
        /* Nav link active state */
        .sidebar-nav-link.active-page {
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
            color: #6366f1;
            border-color: rgba(99,102,241,0.25);
        }
        .dark .sidebar-nav-link.active-page {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
            color: #a5b4fc;
            border-color: rgba(99,102,241,0.3);
        }
        /* Sidebar scrollbar */
        #app-sidebar .sidebar-scroll::-webkit-scrollbar { width: 3px; }
        #app-sidebar .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 99px; }
        /* Hamburger animation */
        #hamburger-btn .bar { transition: all 0.25s ease; transform-origin: center; }
        #hamburger-btn.is-open .bar-1 { transform: rotate(45deg) translate(5px, 5px); }
        #hamburger-btn.is-open .bar-2 { opacity: 0; transform: scaleX(0); }
        #hamburger-btn.is-open .bar-3 { transform: rotate(-45deg) translate(5px, -5px); }

        @media print {
            body * { visibility: hidden; }
            #printable-receipt, #printable-receipt * { visibility: visible; }
            #printable-receipt {
                position: absolute; left: 0; top: 0;
                width: 100%; margin: 0; padding: 10px;
                box-shadow: none !important; border: none !important;
            }
            .print-hidden { display: none !important; }
            #bottom-nav, #main-nav { display: none !important; }
        }

        /* Input focus glow */
        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        /* Card hover lift */
        .card-hover {
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Badge pulse */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .badge-pulse { animation: pulse-soft 2s infinite; }

        /* Number spinner hide */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Modal backdrop blur */
        .modal-backdrop {
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        /* Ripple effect for buttons */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple-effect 0.4s linear;
            pointer-events: none;
        }
        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }

        /* Skeleton loading */
        @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 antialiased text-gray-900 dark:text-white">

    <!-- ===== APP MODALS ===== -->
    <div id="app-modal-root"></div>
    <script>
        window.showAppAlert = function(message, title = 'Informasi') {
            const root = document.getElementById('app-modal-root');
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4 animate-fadeIn';
            overlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
            overlay.style.backdropFilter = 'blur(4px)';
            
            overlay.innerHTML = `
                <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden transform transition-all animate-fadeInUp">
                    <div class="p-5 flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400 text-lg">💡</div>
                            <h3 class="font-bold text-gray-900 dark:text-white">${title}</h3>
                        </div>
                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-2">${String(message).replace(/\n/g, '<br>')}</p>
                    </div>
                    <div class="p-3 bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 flex justify-end">
                        <button class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white text-sm font-bold rounded-xl transition shadow-sm w-full sm:w-auto" onclick="this.closest('.fixed').remove()">Mengerti</button>
                    </div>
                </div>
            `;
            root.appendChild(overlay);
        };

        window.showAppConfirm = function(message, onConfirm, title = 'Konfirmasi') {
            const root = document.getElementById('app-modal-root');
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4 animate-fadeIn';
            overlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
            overlay.style.backdropFilter = 'blur(4px)';
            
            let icon = '⚠️';
            let iconColor = 'orange';
            let btnClass = 'bg-indigo-600 hover:bg-indigo-700';
            let btnText = 'Ya, Lanjutkan';
            
            if (message.toLowerCase().includes('hapus') || message.toLowerCase().includes('batal')) {
                iconColor = 'red';
                btnClass = 'bg-red-600 hover:bg-red-700';
                if(message.toLowerCase().includes('hapus')) btnText = 'Ya, Hapus';
            }
            
            overlay.innerHTML = `
                <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden transform transition-all animate-fadeInUp">
                    <div class="p-5 flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-8 h-8 rounded-full bg-${iconColor}-100 dark:bg-${iconColor}-900/50 flex items-center justify-center text-${iconColor}-600 dark:text-${iconColor}-400 text-lg">${icon}</div>
                            <h3 class="font-bold text-gray-900 dark:text-white">${title}</h3>
                        </div>
                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-2">${String(message).replace(/\n/g, '<br>')}</p>
                    </div>
                    <div class="p-3 bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 flex justify-end gap-2">
                        <button class="px-4 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 active:scale-95 text-sm font-bold rounded-xl transition w-full sm:w-auto" onclick="this.closest('.fixed').remove()">Batal</button>
                        <button id="btn-confirm" class="px-4 py-2 ${btnClass} active:scale-95 text-white text-sm font-bold rounded-xl transition shadow-sm w-full sm:w-auto">${btnText}</button>
                    </div>
                </div>
            `;
            overlay.querySelector('#btn-confirm').onclick = () => {
                overlay.remove();
                if (onConfirm) onConfirm();
            };
            root.appendChild(overlay);
        };
        
        window.alert = function(msg) { window.showAppAlert(msg); };
    </script>

    <script type="module">
        import loginView from './js/views/login.js';
        import cashierView from './js/views/cashier.js';
        import ownerView from './js/views/owner.js';
        import superAdminView from './js/superadmin.js';

        const container    = document.getElementById('app-container');
        const nav          = document.getElementById('main-nav');
        const appSidebar   = document.getElementById('app-sidebar');
        const sidebarOverlay = document.getElementById('app-sidebar-overlay');
        const userBadge    = document.getElementById('user-badge');
        const hamburgerBtn = document.getElementById('hamburger-btn');

        // ── Dark mode setup ─────────────────────────────────────────────────────
        function applyDarkMode() {
            const isDark = localStorage.theme === 'dark' ||
                (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            const iconMoon = document.getElementById('icon-moon');
            const iconSun  = document.getElementById('icon-sun');
            const label    = document.getElementById('dark-mode-label');
            if (iconMoon) iconMoon.classList.toggle('hidden', isDark);
            if (iconSun)  iconSun.classList.toggle('hidden', !isDark);
            if (label)    label.textContent = isDark ? 'Mode Terang' : 'Mode Gelap';
        }
        applyDarkMode();

        window.toggleAppDarkMode = function() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            applyDarkMode();
        };
        // Also expose for superadmin.js compatibility
        window.toggleDarkMode = window.toggleAppDarkMode;

        // ── Sidebar open / close ────────────────────────────────────────────────
        function isDesktop() { return window.innerWidth >= 768; }

        window.openAppSidebar = function() {
            appSidebar.classList.add('sidebar-open');
            sidebarOverlay.classList.add('overlay-active');
            hamburgerBtn?.classList.add('is-open');
            if (isDesktop()) {
                // Desktop: push layout, no scroll lock
                nav.classList.add('nav-sidebar-open');
                document.getElementById('app-container').classList.add('content-sidebar-open');
            } else {
                // Mobile: block background scroll
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeAppSidebar = function() {
            appSidebar.classList.remove('sidebar-open');
            sidebarOverlay.classList.remove('overlay-active');
            hamburgerBtn?.classList.remove('is-open');
            document.body.style.overflow = '';
            nav.classList.remove('nav-sidebar-open');
            document.getElementById('app-container').classList.remove('content-sidebar-open');
        };

        window.toggleAppSidebar = function() {
            if (appSidebar.classList.contains('sidebar-open')) {
                window.closeAppSidebar();
            } else {
                window.openAppSidebar();
            }
        };

        // On resize: adjust push-layout classes based on new viewport
        window.addEventListener('resize', () => {
            if (!appSidebar.classList.contains('sidebar-open')) return;
            if (isDesktop()) {
                document.body.style.overflow = '';
                nav.classList.add('nav-sidebar-open');
                document.getElementById('app-container').classList.add('content-sidebar-open');
            } else {
                document.body.style.overflow = 'hidden';
                nav.classList.remove('nav-sidebar-open');
                document.getElementById('app-container').classList.remove('content-sidebar-open');
            }
        });

        // ── Session helper ──────────────────────────────────────────────────────
        function getUserSession() {
            const s = sessionStorage.getItem('pos_user');
            return s ? JSON.parse(s) : null;
        }

        // ── Build sidebar nav links ─────────────────────────────────────────────
        const PAGE_ITEMS = [
            {
                hash: '#kasir',
                icon: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`,
                label: 'Kasir',
                subtitle: 'Transaksi penjualan',
                roles: ['cashier', 'owner', 'superadmin'],
                color: 'indigo',
            },
            {
                hash: '#owner',
                icon: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
                label: 'Panel Owner',
                subtitle: 'Laporan & manajemen',
                roles: ['owner', 'superadmin'],
                color: 'emerald',
            },
            {
                hash: '#superadmin',
                icon: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
                label: 'Super Admin',
                subtitle: 'Kelola sistem penuh',
                roles: ['superadmin'],
                color: 'violet',
            },
        ];

        window.currentSubTabs = [];

        window.registerSubTabs = function(subTabs) {
            window.currentSubTabs = subTabs || [];
            const user = getUserSession();
            if (user) {
                const hash = window.location.hash || '#kasir';
                window.buildSidebarNav(user.role, hash);
                window.updateNavCurrentPage(hash);
            }
        };

        window.buildSidebarNav = function(role, activeHash) {
            const navContainer = document.getElementById('sidebar-nav-links');
            if (!navContainer) return;

            navContainer.innerHTML = PAGE_ITEMS
                .filter(item => item.roles.includes(role))
                .map(item => {
                    const isActive = (window.location.hash || '#kasir') === item.hash;
                    const colorMap = {
                        indigo: 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400',
                        emerald: 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400',
                        violet: 'bg-violet-100 dark:bg-violet-900/30 text-violet-600 dark:text-violet-400',
                    };

                    let subTabsHTML = '';
                    if (isActive && window.currentSubTabs.length > 0) {
                        subTabsHTML = `
                        <div class="mt-1.5 ml-8 space-y-0.5 border-l-2 border-indigo-100 dark:border-indigo-900/60 pl-2">
                            ${window.currentSubTabs.map(sub => {
                                if (sub.indent) {
                                    // Sub-sub-menu: lebih menjorok, tampilan bullet
                                    return `
                                    <button onclick="${sub.onClick}; window.closeSidebarIfMobile();"
                                            class="w-full flex items-center gap-2 pl-4 pr-2.5 py-1.5 rounded-lg text-xs font-semibold transition-all text-left ${sub.active ? 'bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400' : 'text-gray-400 dark:text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800/50 hover:text-gray-700 dark:hover:text-gray-300'}">
                                        <span class="w-1.5 h-1.5 rounded-full shrink-0 ${sub.active ? 'bg-indigo-500' : 'bg-gray-300 dark:bg-gray-600'}"></span>
                                        <span>${sub.icon}</span>
                                        <span class="truncate">${sub.label}</span>
                                    </button>`;
                                }
                                return `
                                <button onclick="${sub.onClick}; window.closeSidebarIfMobile();"
                                        class="w-full flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all text-left ${sub.active ? 'bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800/50 hover:text-gray-900 dark:hover:text-white'}">
                                    <span>${sub.icon}</span>
                                    <span class="truncate">${sub.label}</span>
                                </button>`;
                            }).join('')}
                        </div>
                        `;
                    }

                    return `
                    <div class="space-y-0.5">
                        <a href="${item.hash}" onclick="window.closeSidebarIfMobile()"
                           class="sidebar-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl border border-transparent transition-all hover:bg-gray-50 dark:hover:bg-gray-800 group ${isActive ? 'active-page' : ''}">
                            <span class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 transition ${colorMap[item.color]}">
                                ${item.icon}
                            </span>
                            <div class="min-w-0">
                                <p class="text-sm font-bold text-gray-900 dark:text-white leading-tight">${item.label}</p>
                                <p class="text-[11px] text-gray-500 dark:text-gray-500 leading-tight">${item.subtitle}</p>
                            </div>
                            ${isActive ? '<svg class="ml-auto w-4 h-4 text-indigo-500 dark:text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>' : ''}
                        </a>
                        ${subTabsHTML}
                    </div>`;
                }).join('');
        };

        // ── Update sidebar user info ─────────────────────────────────────────────
        function updateSidebarUser(user) {
            const nameEl   = document.getElementById('sidebar-user-name');
            const roleEl   = document.getElementById('sidebar-user-role');
            const avatarEl = document.getElementById('sidebar-user-avatar');
            if (!nameEl) return;
            nameEl.textContent   = user.name;
            avatarEl.textContent = (user.name[0] || 'U').toUpperCase();
            const roleLabels = { cashier: '🛒 Kasir', owner: '📊 Owner', superadmin: '⚡ Super Admin' };
            roleEl.textContent = roleLabels[user.role] || user.role;
        }

        // ── Update current page label in top nav (mobile) ───────────────────────
        window.updateNavCurrentPage = function(hash) {
            const labelEl = document.getElementById('nav-current-page');
            if (!labelEl) return;
            const pageLabels = { '#kasir': '🛒 Kasir', '#owner': '📊 Owner', '#superadmin': '⚡ Super Admin' };
            let label = pageLabels[hash] || '';
            const activeSub = (window.currentSubTabs || []).find(s => s.active);
            labelEl.textContent = label;
        };

        // Helper: close sidebar only on mobile (desktop keeps it open across navigation)
        window.closeSidebarIfMobile = function() {
            if (!isDesktop()) window.closeAppSidebar();
        };

        // ── Router ──────────────────────────────────────────────────────────────
        function router() {
            window.currentSubTabs = []; // Reset sub-tabs on route change
            const user = getUserSession();
            const hash = window.location.hash || '#kasir';
            container.innerHTML = '';
            // On desktop keep sidebar open; on mobile close it
            if (!isDesktop()) window.closeAppSidebar();

            if (!user) {
                nav.classList.add('hidden');
                window.closeAppSidebar(); // Always close sidebar on logout/login screen
                loginView.render(container, (userData) => {
                    sessionStorage.setItem('pos_user', JSON.stringify(userData));
                    if (userData.role === 'superadmin') window.location.hash = '#superadmin';
                    else if (userData.role === 'owner') window.location.hash = '#owner';
                    else window.location.hash = '#kasir';
                    router();
                });
                return;
            }

            // Show nav
            nav.classList.remove('hidden');

            // Update badges
            const badgeText = `${user.name} · ${user.role.toUpperCase()}`;
            userBadge.innerText = badgeText;

            // Update sidebar
            updateSidebarUser(user);
            window.buildSidebarNav(user.role, hash);
            window.updateNavCurrentPage(hash);


            // Route
            if (hash === '#superadmin') {
                if (user.role !== 'superadmin') {
                    alert('Akses Ditolak! Halaman ini hanya untuk Super Admin.');
                    window.location.hash = user.role === 'owner' ? '#owner' : '#kasir';
                    return;
                }
                superAdminView.render(container);
            } else if (hash === '#kasir') {
                cashierView.render(container);
            } else if (hash === '#owner') {
                if (user.role !== 'owner' && user.role !== 'superadmin') {
                    alert('Akses Ditolak! Halaman ini hanya untuk Owner.');
                    window.location.hash = '#kasir';
                    return;
                }
                ownerView.render(container);
            }
        }

        // ── Logout handlers ─────────────────────────────────────────────────────
        async function doLogout() {
            if (typeof window.recordLogoutAttendance === 'function') {
                await window.recordLogoutAttendance();
            }
            sessionStorage.removeItem('pos_user');
            window.closeAppSidebar();
            window.location.hash = '#login';
            router();
        }

        document.getElementById('btn-logout').onclick = doLogout;
        document.getElementById('sidebar-logout-btn').onclick = doLogout;

        window.addEventListener('hashchange', router);
        window.addEventListener('load', router);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
        }
    </script>
</body>
</html>
